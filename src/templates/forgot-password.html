<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
</head>
<body style="margin:0; padding:0; background:#f3f4f6; font-family:Arial, sans-serif;">
    <div style="max-width:600px; margin:30px auto; background:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 8px 22px rgba(0,0,0,0.08);">
        <div style="background:linear-gradient(90deg,#0f172a,#f97316); color:#ffffff; padding:24px;">
            <h2 style="margin:0;">Reset Your Password</h2>
            <p style="margin:6px 0 0; font-size:14px; opacity:0.9;">Sport Arena Booking System</p>
        </div>
        <div style="padding:24px; text-align:center;">
            <img src="cid:logo" alt="logo" width="90" style="margin-bottom:16px; max-width:100%; height:auto;">
            <p style="margin:0 0 14px; color:#374151; font-size:14px; line-height:1.6;">
                Hello {{name}}, we received a request to reset your password.
                This link will expire in 15 minutes.
            </p>
            <a href="{{resetUrl}}" style="display:inline-block; padding:11px 20px; background:#2563eb; color:#ffffff; text-decoration:none; border-radius:7px; font-size:14px;">
                Reset Password
            </a>
            <p style="margin:16px 0 0; color:#6b7280; font-size:12px;">
                If you did not request this, please ignore this email.
            </p>
        </div>
        <div style="padding:14px 24px; background:#f9fafb; border-top:1px solid #e5e7eb;">
            <p style="margin:0; color:#6b7280; font-size:12px;">Sport Arena Booking System Team</p>
        </div>
    </div>
</body>
</html>
