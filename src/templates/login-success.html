<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Alert</title>
</head>
<body style="margin:0; padding:0; background:#f3f4f6; font-family:Arial, sans-serif;">
    <div style="max-width:600px; margin:30px auto; background:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 8px 22px rgba(0,0,0,0.08);">
        <div style="background:linear-gradient(90deg,#1f2937,#2563eb); color:#ffffff; padding:20px 24px;">
            <h2 style="margin:0;">Sport Arena Login Alert</h2>
        </div>
        <div style="padding:24px;">
            <img src="cid:logo" alt="logo" width="85" style="display:block; margin:0 auto 16px; max-width:100%; height:auto;">
            <p style="margin:0 0 14px; color:#111827; font-size:16px;">Hi {{name}},</p>
            <p style="margin:0 0 14px; color:#4b5563; font-size:14px; line-height:1.7;">
                A successful login was detected on your account.
            </p>
            <div style="background:#f9fafb; border:1px solid #e5e7eb; border-radius:8px; padding:14px; margin:16px 0;">
                <p style="margin:0 0 8px; font-size:14px; color:#374151;"><strong>Email:</strong> {{email}}</p>
                <p style="margin:0; font-size:14px; color:#374151;"><strong>Time:</strong> {{time}}</p>
            </div>
            <p style="margin:0 0 18px; color:#6b7280; font-size:13px; line-height:1.6;">
                If this was not you, please reset your password immediately.
            </p>
            <a href="http://localhost:5173/forgot-password" style="display:inline-block; background:#2563eb; color:#ffffff; text-decoration:none; padding:10px 18px; border-radius:7px; font-size:14px;">
                Reset Password
            </a>
            <a href="http://localhost:5173/login" style="display:inline-block; margin-left:10px; background:#16a34a; color:#ffffff; text-decoration:none; padding:10px 18px; border-radius:7px; font-size:14px;">
                Login Now
            </a>
        </div>
        <div style="padding:14px 24px; background:#f9fafb; border-top:1px solid #e5e7eb;">
            <p style="margin:0; color:#6b7280; font-size:12px;">Sport Arena Booking System Security Team</p>
        </div>
    </div>
</body>
</html>
