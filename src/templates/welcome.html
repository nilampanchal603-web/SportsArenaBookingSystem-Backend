<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
</head>

<body style="margin:0; padding:0; background:#f3f4f6; font-family:Arial, sans-serif;">
<div style="max-width:600px; margin:30px auto; background:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 8px 22px rgba(0,0,0,0.08);">
    <div style="background:linear-gradient(90deg,#0f172a,#7c3aed); color:#ffffff; padding:24px;">
        <h2 style="margin:0; font-size:24px;">Welcome to Sport Arena</h2>
        <p style="margin:6px 0 0; font-size:14px; opacity:0.9;">Your account is ready to use.</p>
    </div>
    <div style="padding:24px;">
        <img src="cid:logo" alt="Welcome image" width="90" style="display:block; margin:0 auto 16px;  max-width:100%; height:auto">
        <h3 style="margin:0 0 8px; color:#111827; text-align:center;">Hello {{name}},</h3>
        <p style="margin:0 0 14px; color:#4b5563; font-size:14px; line-height:1.7; text-align:center;">
            Your account has been created successfully. You can now book arenas, manage sessions, and access your role dashboard.
        </p>
        <div style="text-align:center;">
            <a href="http://localhost:5173/login" style="display:inline-block; margin-top:8px; padding:11px 20px; background:#2563eb; color:#ffffff; text-decoration:none; border-radius:7px; font-size:14px;">
                Go to Login
            </a>
        </div>
    </div>
    <div style="padding:14px 24px; background:#f9fafb; border-top:1px solid #e5e7eb;">
        <p style="margin:0; color:#6b7280; font-size:12px;">Sport Arena Booking System Team</p>
    </div>
</div>
</body>
</html>
